name: Render KeepAlive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_KEEPALIVE_URLS: ${{ vars.RENDER_KEEPALIVE_URLS || 'https://joker.onrender.com https://kool-klown-klanx-discord-bot.onrender.com' }}
    steps:
      - name: Ping Render
        run: |
          set -euo pipefail

          for base_url in ${RENDER_KEEPALIVE_URLS}; do
            echo "Trying ${base_url}"
            if curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 10 \
              --connect-timeout 20 \
              --max-time 120 \
              --user-agent "github-actions-render-keepalive" \
              "${base_url}/health"; then
              curl \
                --fail \
                --silent \
                --show-error \
                --location \
                --retry 3 \
                --retry-all-errors \
                --retry-delay 10 \
                --connect-timeout 20 \
                --max-time 120 \
                --user-agent "github-actions-render-keepalive" \
                "${base_url}/"
              exit 0
            fi
          done

          echo "No Render keepalive URL responded successfully."
          exit 1
