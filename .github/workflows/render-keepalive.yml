name: Render KeepAlive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render
        run: curl --fail --silent --show-error --max-time 60 https://kool-klown-klanx-discord-bot.onrender.com
