name: Render KeepAlive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_KEEPALIVE_URL: ${{ vars.RENDER_KEEPALIVE_URL || 'https://kool-klown-klanx-discord-bot.onrender.com' }}
    steps:
      - name: Ping Render
        run: |
          set -euo pipefail

          for path in /health /; do
            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 8 \
              --retry-all-errors \
              --retry-delay 15 \
              --connect-timeout 20 \
              --max-time 120 \
              --user-agent "github-actions-render-keepalive" \
              "${RENDER_KEEPALIVE_URL}${path}"
          done
